# SuperQode project configuration example for local/self-hosted models.
#
# This file is a minimal `superqode.yaml` with local model defaults.
# Use HarnessSpec files in `examples/harnesses/` for runtime, tool, sandbox,
# checks, hooks, workflow, and observability policy.
#
# SETUP REQUIREMENTS:
# - Ollama: Run 'ollama serve' and pull models (e.g., ollama pull llama3.2:3b)
# - MLX: Start server with 'mlx_lm.server --model <model-id>'
# - LM Studio: Open GUI, load model, start Local Server

superqode:
  version: "1.0"
  team_name: "Local Models Project"
  description: "Local/self-hosted model defaults for SuperQode"
  cost_tracking:
    enabled: false

default:
  mode: local
  provider: ollama
  model: qwen2.5-coder:7b

providers:
  ollama:
    base_url: http://localhost:11434
    recommended_models:
      - qwen2.5-coder:7b
      - llama3.2:3b

  mlx:
    base_url: http://localhost:8080
    recommended_models:
      - mlx-community/Qwen2.5-Coder-32B-Instruct-4bit

  lmstudio:
    base_url: http://localhost:1234
    recommended_models:
      - qwen2.5-coder:7b

mcp_servers: {}

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
#
# Ollama Setup:
#   1. Install: https://ollama.ai/
#   2. Start: ollama serve
#   3. Pull model: ollama pull llama3.2:3b
#   4. Verify: ollama list
#
# MLX Setup:
#   1. Install: pip install mlx-lm
#   2. Start server: mlx_lm.server --model mlx-community/Qwen2.5-Coder-32B-Instruct-4bit
#   3. Server runs on: http://localhost:8080
#   4. Verify: curl http://localhost:8080/v1/models
#
# LM Studio Setup:
#   1. Download: https://lmstudio.ai/
#   2. Open LM Studio application
#   3. Download model (search for 'qwen2.5-coder:7b' or 'llama3.2:3b')
#   4. Load model in LM Studio
#   5. Start Local Server (Local Server tab → Start Server)
#   6. Server runs on: http://localhost:1234
#   7. Verify: curl http://localhost:1234/v1/models
#
# =============================================================================
