version: 1
name: example-coding
description: General coding harness with repository tools, shell access, approvals, and event storage.
flavor: coding
runtime:
  backend: builtin
model_policy:
  primary: gpt-4o-mini
  fallbacks:
    - gpt-4o-mini
  profile: balanced-coding
  temperature: 0.2
  reasoning: medium
  config:
    provider: openai
    max_iterations: 12
execution_policy:
  sandbox: docker
  approval_profile: balanced
  allow_read: true
  allow_write: true
  allow_shell: true
  allow_network: false
  allowed_commands:
    - pytest
    - uv run pytest
    - uv run ruff
  blocked_categories:
    - destructive
    - credential-access
agents:
  - id: coder
    role: implementation
    system_prompt: |
      Work as a pragmatic coding agent. Inspect the repository before editing,
      keep changes focused, and verify behavior with the narrowest useful test.
    tools:
      - read_file
      - write_file
      - list_directory
      - edit_file
      - patch
      - grep
      - glob
      - repo_search
      # Optional: install superqode[semantic], index once with ccc, then enable:
      # - semantic_search
      # Optional: inspect large files/logs/diffs by handle:
      # - context_handle
      # Optional: enable recursion policy, then use for bounded child fan-out:
      # - spawn_harness
      # Optional: execute a bounded dynamic plan over spawn_harness:
      # - dynamic_workflow
      # Optional: compile a restricted Python-like plan to dynamic_workflow:
      # - dynamic_workflow_script
      - bash
      - todo_write
      - todo_read
    skills:
      - repo-navigation
      - implementation
    max_iterations: 12
workflow:
  mode: single
  max_task_depth: 4
  parallelism: 1
  merge_strategy: summary
context:
  instruction_files:
    - AGENTS.md
    - CLAUDE.md
    - SUPERQODE.md
  skills_dir: .agents/skills
  roles_dir: .agents/roles
  session_storage: .superqode/sessions
  compaction:
    strategy: summarize-when-large
  memory:
    enabled: true
checks:
  enabled: true
  fail_on_error: false
  timeout_seconds: 300
  custom_steps:
    - name: lint
      command: ruff check src tests
      enabled: true
      timeout: 300
observability:
  events: true
  traces: false
  run_store: file
metadata:
  example: coding
  best_for: general repository coding
