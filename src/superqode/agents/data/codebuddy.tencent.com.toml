identity = "codebuddy.tencent.com"
name = "CodeBuddy Code"
short_name = "codebuddy"
url = "https://www.codebuddy.cn/cli/"
protocol = "acp"
author_name = "Tencent Cloud"
author_url = "https://www.tencentcloud.com"
publisher_name = "SuperQode"
