# SuperQode project configuration example.
#
# This file is a minimal `superqode.yaml` for a hosted BYOK provider.
# Use HarnessSpec files in `examples/harnesses/` for runtime, tool, sandbox,
# checks, hooks, workflow, and observability policy.

superqode:
  version: "1.0"
  team_name: "Simple SuperQode Project"
  description: "Hosted provider defaults for SuperQode"
  gateway:
    type: litellm
  cost_tracking:
    enabled: true
    show_after_task: true
  errors:
    surface_rate_limits: true
    surface_auth_errors: true

default:
  mode: byok
  provider: openai
  model: gpt-4o-mini

providers:
  openai:
    api_key_env: OPENAI_API_KEY
    recommended_models:
      - gpt-4o-mini
      - gpt-4o

  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    recommended_models:
      - claude-sonnet-4

mcp_servers: {}
