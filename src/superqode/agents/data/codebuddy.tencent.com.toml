run_command."*" = "codebuddy --acp"

help = '''
# CodeBuddy Code

CodeBuddy Code is Tencent Cloud's terminal coding agent.

## Installation

```bash
npm install -g @tencent-ai/codebuddy-code
```
'''

[actions."*".install]
command = "npm install -g @tencent-ai/codebuddy-code"
description = "Install CodeBuddy Code"
