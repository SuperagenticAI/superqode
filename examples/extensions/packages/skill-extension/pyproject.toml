[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "superqode-example-skill-extension"
version = "0.1.0"
description = "Independent skill extension used to validate SuperQode Extensible Core"
requires-python = ">=3.12"
dependencies = ["superqode>=0.2.31,<1.0"]

[project.entry-points."superqode.extensions"]
example-skill = "superqode_example_skill:extension"

[tool.hatch.build.targets.wheel]
packages = ["src/superqode_example_skill"]
