# SuperQode project configuration example with BYOK providers and ACP agents.
#
# This file is a minimal `superqode.yaml` with defaults for both BYOK cloud
# providers and ACP coding agents. Use HarnessSpec files in examples/harnesses/
# for runtime, tool, sandbox, checks, hooks, workflow, and observability policy.
#
# SECURITY: SuperQode NEVER stores your API keys.
# All keys are read from YOUR environment variables at runtime.

superqode:
  version: "1.0"
  team_name: "Hybrid SuperQode Project"
  description: "BYOK + ACP defaults for SuperQode"
  gateway:
    type: litellm
  cost_tracking:
    enabled: true
    show_after_task: true
  errors:
    surface_rate_limits: true
    surface_auth_errors: true

default:
  mode: byok
  provider: openai
  model: gpt-4o

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    recommended_models:
      - claude-sonnet-4

  openai:
    api_key_env: OPENAI_API_KEY
    recommended_models:
      - gpt-4o

  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    recommended_models:
      - deepseek-v3
      - deepseek-r1

  groq:
    api_key_env: GROQ_API_KEY
    recommended_models:
      - llama-3.3-70b-versatile

agents:
  opencode:
    provider: opencode
    model: glm-4.7-free
    default: true

mcp_servers:
  filesystem:
    transport: stdio
    command: uvx
    args: ["mcp-server-filesystem", "--root", "."]
    enabled: true

  github:
    transport: stdio
    command: uvx
    args: ["mcp-server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    enabled: true
