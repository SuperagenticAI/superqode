[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "superqode-example-policy-extension"
version = "0.1.0"
description = "Independent policy extension used to validate SuperQode Extensible Core"
requires-python = ">=3.12"
dependencies = ["superqode>=0.2.30,<1.0"]

[project.entry-points."superqode.extensions"]
example-policy = "superqode_example_policy:extension"

[tool.hatch.build.targets.wheel]
packages = ["src/superqode_example_policy"]
