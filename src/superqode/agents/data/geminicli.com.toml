# Schema defined in agent_schema.py
# https://github.com/google-gemini/gemini-cli
identity = "geminicli.com"
name = "Gemini CLI"
short_name = "gemini"
url = "https://github.com/google-gemini/gemini-cli"
protocol = "acp"
author_name = "Google"
author_url = "https://www.google.com"
publisher_name = "Google"
publisher_url = "https://github.com/google-gemini/gemini-cli"
type = "coding"
description = "Google's Gemini CLI ACP implementation. Consumer Google AI Pro/Ultra/free Code Assist users should migrate to Antigravity CLI; enterprise/API-key ACP users can keep this route."
tags = ["google", "gemini", "multimodal", "acp", "official-acp"]
run_command."*" = "gemini --acp"

# API key environment variables
api_key_env_vars = ["GEMINI_API_KEY", "GOOGLE_API_KEY"]

help = '''
# Gemini CLI

**Google Gemini CLI ACP route**

Query and edit large codebases, generate apps from images or PDFs, and automate complex workflows, all from your terminal.

> Consumer migration note: Google is moving Google AI Pro, Ultra, and free Code Assist individual users to Antigravity CLI. In SuperQode, use `:connect antigravity` for the new `agy` CLI handoff. Keep this Gemini CLI ACP route for enterprise/API-key use cases where Gemini CLI remains supported.

## Key Features

- **Large Codebase Support**: Handle million-line codebases with 2M token context
- **Multimodal Input**: Generate apps from images, PDFs, and documents
- **Workflow Automation**: Automate complex development workflows
- **Terminal-Native**: Built for developers who live in the command line
- **ACP Native**: Full Agent Client Protocol support

## Installation

Install globally via npm:
```bash
npm install -g @google/gemini-cli
```

## Configuration

Set your API key:
```bash
export GEMINI_API_KEY=your_api_key_here
# or
export GOOGLE_API_KEY=your_api_key_here
```

## ACP Mode

Run the ACP server:
```bash
gemini --acp
```

## Available Models

- **gemini-3.1-pro-preview** - Latest Gemini Pro from models.dev
- **gemini-flash-latest** - Latest Gemini Flash from models.dev

---

**Consumer replacement**: https://antigravity.google/docs/cli-overview
**For latest ACP install instructions**: https://zed.dev/acp/agent/gemini-cli
**GitHub**: https://github.com/google-gemini/gemini-cli
'''

[actions."*".install]
command = "npm i -g @google/gemini-cli"
description = "Install Gemini CLI globally (see https://zed.dev/acp for latest)"

[actions."*".configure]
command = "gemini --configure"
description = "Configure Gemini CLI with your API key"
