# Gemma 3 / Gemma 4 family pack.
name: gemma4
description: "Gemma 3 and Gemma 4 starter: strict-JSON tools, minimal prompt"
match: [gemma-4, gemma4, gemma-3, gemma3]
policy:
  temperature: 0.2
  system_level: minimal
  tool_profile: ds4
  tool_call_format: strict-json
  parallel_tools: false
  session_history_limit: 12
notes:
  - "This pack assumes strict JSON tool schemas and a compact system prompt; validate that against your exact Gemma checkpoint, quantization, and engine."
  - "The 12B variant is multimodal; pair it as a vision/utility companion to a larger coder."
  - "Customize history, tools, and permissions for your project before broad write/shell use."
