[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "superqode-example-tool-extension"
version = "0.2.0"
description = "Upgrade fixture for the SuperQode Extensible Core tool package"
requires-python = ">=3.12"
dependencies = ["superqode>=0.2.25,<1.0"]

[project.entry-points."superqode.extensions"]
example-tool = "superqode_example_tool:extension"

[tool.hatch.build.targets.wheel]
packages = ["src/superqode_example_tool"]
