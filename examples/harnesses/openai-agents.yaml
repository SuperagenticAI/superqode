version: 1
name: example-openai-agents
description: OpenAI Agents SDK harness with approval pauses, MCP-ready tools, and sandbox-aware events.
flavor: coding
runtime:
  backend: openai-agents
  config:
    openai_agents:
      stream_events: true
model_policy:
  primary: gpt-4o-mini
  fallbacks:
    - gpt-4o-mini
  profile: openai-agents-coding
  temperature: 0.2
  reasoning: medium
  config:
    provider: openai
    max_iterations: 12
execution_policy:
  sandbox: local
  approval_profile: balanced
  allow_read: true
  allow_write: true
  allow_shell: true
  allow_network: false
  allowed_commands:
    - pytest
    - uv run pytest
    - uv run ruff
  blocked_categories:
    - destructive
    - credential-access
agents:
  - id: openai-coder
    role: implementation
    system_prompt: |
      Use approval-aware tool calls for writes and shell commands. Prefer small
      patches and include the exact verification command when you finish.
    tools:
      - read_file
      - write_file
      - list_directory
      - edit_file
      - patch
      - grep
      - glob
      - bash
    skills:
      - implementation
    max_iterations: 12
workflow:
  mode: single
  max_task_depth: 4
  parallelism: 1
  merge_strategy: summary
context:
  instruction_files:
    - AGENTS.md
    - SUPERQODE.md
  skills_dir: .agents/skills
  roles_dir: .agents/roles
  session_storage: .superqode/sessions
  compaction:
    strategy: summarize-when-large
  memory:
    enabled: true
checks:
  enabled: true
  fail_on_error: false
  timeout_seconds: 300
  custom_steps: []
observability:
  events: true
  traces: false
  run_store: file
metadata:
  example: openai-agents
  install: pip install "superqode[openai-agents]"
  best_for: OpenAI Agents SDK approvals and sandbox events
