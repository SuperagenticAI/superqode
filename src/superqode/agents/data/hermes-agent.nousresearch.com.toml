run_command."*" = "hermes acp"

help = '''
# Hermes Agent

Self-improving open-source agent by Nous Research (skills, persistent memory,
cross-session learning) with full ACP support.

## Installation

```bash
uv tool install 'hermes-agent[acp]'
```

## Configuration

Hermes needs a model provider before ACP sessions start. For local models,
point it at any OpenAI-compatible server in `~/.hermes/config.yaml`:

```yaml
model:
  default: "qwen3-coder:30b-a3b"
  provider: "ollama"
  base_url: "http://127.0.0.1:11434/v1"
```

Hosted providers (Nous Portal, OpenRouter, Anthropic, and others) work via
their usual API key environment variables; see the Hermes docs.

## Verify

```bash
superqode agents doctor hermes --live
```

Then connect from the TUI with `:connect acp hermes`.

See https://hermes-agent.nousresearch.com/docs/user-guide/features/acp for details.
'''

[actions."*".install]
command = "uv tool install 'hermes-agent[acp]'"
description = "Install Hermes Agent with ACP support (isolated tool env)"
